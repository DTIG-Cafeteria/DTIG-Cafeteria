<!DOCTYPE html>
<html>
<head>
<title>Kitchen Panel</title>

<style>
body {font-family:Poppins; background:#f4f4f4;}

.card {
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button {
  background:#28a745;
  color:white;
  padding:8px;
  border:none;
  border-radius:8px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<h2 style="padding:15px;">👨‍🍳 Kitchen Dashboard</h2>
<div id="orders"></div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LIVE ORDERS
db.collection("orders").orderBy("created","desc")
.onSnapshot(snapshot=>{
  let html="";
  snapshot.forEach(doc=>{
    let o = doc.data();

    html+=`
    <div class="card">
      <b>Token #${o.token}</b><br>
      Items: ${o.items.map(i=>i.name+" x"+i.qty).join(", ")}<br>
      Status: ${o.status}<br><br>

      <button onclick="updateStatus('${doc.id}','Preparing')">Preparing</button>
      <button onclick="updateStatus('${doc.id}','Ready')">Ready</button>
    </div>`;
  });

  document.getElementById("orders").innerHTML=html;
});

// UPDATE STATUS
function updateStatus(id,status){
  db.collection("orders").doc(id).update({
    status:status
  });
}

</script>

</body>
</html>
