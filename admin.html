<!DOCTYPE html>
<html>
<head>
<title>DTIG Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f4f4; }
.card {
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}
button {
  background:green;
  color:white;
  border:none;
  padding:6px 10px;
}
</style>
</head>

<body>

<h2>👨‍🍳 Kitchen Orders</h2>
<div id="orders"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAPvkEd6A6Gy2Ar7zuG_fCAPecuj2joFN4",
  authDomain: "dtig-cafeteria.firebaseapp.com",
  projectId: "dtig-cafeteria",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function loadOrders(){
  db.collection("orders").orderBy("createdAt","desc")
  .onSnapshot(snapshot=>{
    let html="";
    snapshot.forEach(doc=>{
      let d=doc.data();
      html+=`
      <div class="card">
        <h3>${d.token}</h3>
        <p>₹${d.total}</p>
        <p>Status: ${d.status}</p>
        <button onclick="markReady('${doc.id}','${d.phone}','${d.token}')">Mark Ready</button>
      </div>`;
    });
    document.getElementById("orders").innerHTML=html;
  });
}

function markReady(id,phone,token){
  db.collection("orders").doc(id).update({status:"Ready"});

  let msg=`Token ${token} - Your food is ready 🍽️`;
  window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`);
}

loadOrders();
</script>

</body>
</html>
