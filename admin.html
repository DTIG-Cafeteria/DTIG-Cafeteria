<!DOCTYPE html>
<html>
<head>
<title>Kitchen Panel</title>
<style>
body {font-family: Arial;}
.card {
  background:#f5f5f5; padding:10px; margin:10px;
  border-radius:10px;
}
button {margin:5px;}
</style>
</head>

<body>

<h2>Kitchen Orders</h2>
<div id="orders"></div>

<script>

function loadOrders(){
  let orders = JSON.parse(localStorage.getItem("orders")||"[]");
  let div = document.getElementById("orders");
  div.innerHTML="";

  orders.forEach((order,index)=>{
    div.innerHTML += `
    <div class="card">
      Token: ${order.token}<br>
      Items: ${order.items.map(i=>i.name).join(", ")}<br>
      Status: ${order.status}<br>
      <button onclick="markReady(${index})">Mark Ready</button>
    </div>`;
  });
}

function markReady(i){
  let orders = JSON.parse(localStorage.getItem("orders"));
  orders[i].status = "Ready";
  localStorage.setItem("orders", JSON.stringify(orders));

  let current = JSON.parse(localStorage.getItem("currentOrder"));
  if(current && current.token == orders[i].token){
    current.status="Ready";
    localStorage.setItem("currentOrder", JSON.stringify(current));
  }

  loadOrders();
}

setInterval(loadOrders,2000);

</script>

</body>
</html>
