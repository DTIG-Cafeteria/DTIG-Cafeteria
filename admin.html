<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {font-family:Poppins; background:#f5f5f5; padding:20px;}
.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}
.badge {
  padding:4px 8px;
  border-radius:6px;
}
.preparing {background:orange; color:white;}
.ready {background:green; color:white;}
button {
  margin-top:5px;
  padding:6px;
  border:none;
  background:#ff5200;
  color:white;
}
</style>
</head>

<body>

<h2>👨‍🍳 Live Orders</h2>
<div id="orders"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  projectId: "dtig-cafeteria"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("orders").onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
let d=doc.data();
html+=`
<div class="card">
<h3>${d.token}</h3>
<p>₹${d.total}</p>
<span class="badge ${d.status==="Ready"?"ready":"preparing"}">${d.status}</span>
<br>
<button onclick="ready('${doc.id}','${d.phone}','${d.token}')">Mark Ready</button>
</div>`;
});
document.getElementById("orders").innerHTML=html;
});

function ready(id,phone,token){
db.collection("orders").doc(id).update({status:"Ready"});
window.open(`https://wa.me/91${phone}?text=Your order ${token} is ready`);
}
</script>

</body>
</html>
