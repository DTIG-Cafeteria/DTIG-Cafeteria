<!DOCTYPE html>
<html>
<head>
<title>Kitchen Panel</title>

<style>
body {font-family:Poppins; background:#f4f4f4;}

.card {
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button {
  background:#28a745;
  color:white;
  padding:8px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<h2 style="padding:15px;">👨‍🍳 Kitchen Dashboard</h2>

<div class="card">
  Token #101 <br>
  Items: Burger, Fries <br>
  Status: Preparing <br><br>
  <button>Mark Ready</button>
</div>

<div class="card">
  Token #102 <br>
  Items: Tea, Omelette <br>
  Status: Preparing <br><br>
  <button>Mark Ready</button>
</div>

</body>
</html>
