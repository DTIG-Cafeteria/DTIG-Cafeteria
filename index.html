<!DOCTYPE html>
<html>
<head>
<title>DTIG Cafeteria</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
.header {background:#FC8019; color:white; padding:15px; text-align:center;}
.container {padding:15px;}
.card {
  background:white; padding:10px; margin:10px 0;
  border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
button {
  background:#FC8019; color:white; border:none;
  padding:8px 12px; border-radius:5px;
}
.cart {
  position:fixed; bottom:0; width:100%;
  background:white; padding:10px;
  box-shadow:0 -2px 5px rgba(0,0,0,0.2);
}
.hidden {display:none;}
</style>
</head>

<body>

<div class="header">DTIG Cafeteria</div>

<div class="container" id="loginPage">
  <h3>Enter Phone Number</h3>
  <input id="phone" placeholder="Phone Number"><br><br>
  <button onclick="login()">Continue</button>
</div>

<div class="container hidden" id="menuPage">
  <h3>Menu</h3>
  <div id="menu"></div>
</div>

<div class="cart hidden" id="cartBar">
  Total: ₹<span id="total">0</span>
  <button onclick="checkout()">Checkout</button>
</div>

<div class="container hidden" id="checkoutPage">
  <h3>Select Time</h3>
  <select id="time">
    <option>ASAP</option>
    <option>10 mins</option>
    <option>20 mins</option>
  </select><br><br>
  <button onclick="pay()">Pay Now</button>
</div>

<div class="container hidden" id="statusPage">
  <h3>Order Status</h3>
  <p id="orderInfo"></p>
</div>

<script>

let cart = [];
let menuItems = [
{name:"Tea", price:15},
{name:"Coffee", price:20},
{name:"Omelette", price:35},
{name:"Veg Sandwich", price:45},
{name:"Chicken Burger", price:80},
{name:"Fries", price:40},
{name:"Veg Momos", price:60},
{name:"Chicken Nuggets", price:70}
];

function login(){
  let phone = document.getElementById("phone").value;
  if(phone==""){alert("Enter phone"); return;}
  localStorage.setItem("user", phone);
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("menuPage").classList.remove("hidden");
  document.getElementById("cartBar").classList.remove("hidden");
  loadMenu();
}

function loadMenu(){
  let menuDiv = document.getElementById("menu");
  menuItems.forEach((item,i)=>{
    menuDiv.innerHTML += `
    <div class="card">
      ${item.name} - ₹${item.price}
      <button onclick="addToCart(${i})">Add</button>
    </div>`;
  });
}

function addToCart(i){
  cart.push(menuItems[i]);
  updateCart();
}

function updateCart(){
  let total = cart.reduce((sum,item)=>sum+item.price,0);
  document.getElementById("total").innerText = total;
}

function checkout(){
  document.getElementById("menuPage").classList.add("hidden");
  document.getElementById("checkoutPage").classList.remove("hidden");
}

function pay(){
  let orderId = "ORD"+Math.floor(Math.random()*10000);
  let token = Math.floor(Math.random()*100)+1;

  let order = {
    id:orderId,
    token:token,
    items:cart,
    status:"Preparing"
  };

  localStorage.setItem("currentOrder", JSON.stringify(order));

  let allOrders = JSON.parse(localStorage.getItem("orders")||"[]");
  allOrders.push(order);
  localStorage.setItem("orders", JSON.stringify(allOrders));

  document.getElementById("checkoutPage").classList.add("hidden");
  document.getElementById("statusPage").classList.remove("hidden");

  document.getElementById("orderInfo").innerHTML =
    `Order ID: ${orderId}<br>
     Token: ${token}<br>
     Status: <span id="statusText">Preparing</span>`;

  checkStatus();
}

function checkStatus(){
  setInterval(()=>{
    let order = JSON.parse(localStorage.getItem("currentOrder"));
    if(order){
      document.getElementById("statusText").innerText = order.status;
      if(order.status=="Ready"){
        alert("Your food is ready!");
      }
    }
  },2000);
}

</script>

</body>
</html>
