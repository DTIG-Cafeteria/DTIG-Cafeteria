<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DTIG Cafeteria</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {font-family:Poppins; margin:0; background:#f4f4f4;}
.header {background:#FC8019; color:white; padding:15px; font-size:20px;}

.card {
  display:flex; justify-content:space-between;
  background:white; margin:12px; padding:12px;
  border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

img {width:60px; border-radius:10px;}

.cart {
  position:fixed; bottom:0; width:100%;
  background:white; padding:10px;
  display:flex; justify-content:space-between;
}

.btn {
  background:#FC8019; color:white;
  border:none; padding:8px 12px; border-radius:8px;
}

.hidden {display:none;}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="header">🍽️ DTIG Cafeteria</div>

<div id="menu"></div>

<div class="cart">
  ₹ <span id="total">0</span>
  <button class="btn" onclick="placeOrder()">Order</button>
</div>

<div id="statusPage" class="hidden"></div>

<script>

// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cart = [];
let currentOrderId = null;

const items = [
{name:"Tea", price:15, img:"https://i.imgur.com/1bX5QH6.png"},
{name:"Coffee", price:20, img:"https://i.imgur.com/7s5V6wF.png"},
{name:"Omelette", price:35, img:"https://i.imgur.com/5WbQ7bD.png"},
{name:"Burger", price:80, img:"https://i.imgur.com/6X4Y3Gg.png"},
{name:"Fries", price:40, img:"https://i.imgur.com/2X8Qf8F.png"},
{name:"Momos", price:60, img:"https://i.imgur.com/oYiTqum.png"}
];

// LOAD MENU
function loadMenu(){
  let html="";
  items.forEach((item,i)=>{
    html+=`
    <div class="card">
      <img src="${item.img}">
      <div>
        <b>${item.name}</b><br>₹${item.price}
      </div>
      <button onclick="add(${i})">Add</button>
    </div>`;
  });
  document.getElementById("menu").innerHTML=html;
}

// ADD
function add(i){
  let existing = cart.find(c=>c.name===items[i].name);
  if(existing){ existing.qty++; }
  else { cart.push({...items[i], qty:1}); }
  updateTotal();
}

// TOTAL
function updateTotal(){
  let total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById("total").innerText = total;
}

// PLACE ORDER
function placeOrder(){
  if(cart.length==0){ alert("Cart empty"); return; }

  let token = Math.floor(Math.random()*1000);

  db.collection("orders").add({
    items:cart,
    token:token,
    status:"Preparing",
    created: new Date()
  }).then(doc=>{
    currentOrderId = doc.id;
    showStatus(token);
    listenStatus();
  });
}

// SHOW STATUS
function showStatus(token){
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("statusPage").classList.remove("hidden");

  document.getElementById("statusPage").innerHTML = `
    <h3 style="padding:10px;">Token: ${token}</h3>
    <p style="padding:10px;">Status: <span id="statusText">Preparing</span></p>
  `;
}

// LIVE STATUS
function listenStatus(){
  db.collection("orders").doc(currentOrderId)
  .onSnapshot(doc=>{
    let data = doc.data();
    document.getElementById("statusText").innerText = data.status;

    if(data.status=="Ready"){
      alert("🔥 Food Ready! Please collect.");
    }
  });
}

loadMenu();

</script>

</body>
</html>
