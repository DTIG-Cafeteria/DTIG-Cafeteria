<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTIG Cafeteria</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f8f8f8;
}

header {
  background: #ff5200;
  color: white;
  padding: 15px;
  font-size: 22px;
  text-align: center;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.card img {
  width: 80px;
  border-radius: 10px;
}

.card button {
  background: #ff5200;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
}

.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  box-shadow: 0 -3px 10px rgba(0,0,0,0.1);
  display: flex;
  justify-content: space-between;
}

.order-btn {
  background: green;
  color: white;
  padding: 10px;
  border-radius: 6px;
  border: none;
}
</style>
</head>

<body>

<header>🍽️ DTIG Cafeteria</header>

<div class="container" id="menu"></div>

<div class="cart">
  <span>Total: ₹<span id="total">0</span></span>
  <button class="order-btn" onclick="placeOrder()">Place Order</button>
</div>

<script>
// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAPvkEd6A6Gy2Ar7zuG_fCAPecuj2joFN4",
  authDomain: "dtig-cafeteria.firebaseapp.com",
  projectId: "dtig-cafeteria",
  storageBucket: "dtig-cafeteria.firebasestorage.app",
  messagingSenderId: "840733763257",
  appId: "1:840733763257:web:43fa340a01303ca4171d68"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cart = [];

const items = [
  {name:"Tea", price:10, img:"https://i.imgur.com/0umadnY.jpg"},
  {name:"Coffee", price:15, img:"https://i.imgur.com/1GrakTl.jpg"},
  {name:"Omelette", price:40, img:"https://i.imgur.com/Zz4Q8vF.jpg"},
  {name:"Veg Meal", price:80, img:"https://i.imgur.com/eTmWoAN.jpg"},
  {name:"Chicken Meal", price:110, img:"https://i.imgur.com/5Aqgz7o.jpg"}
];

function loadMenu(){
  let html="";
  items.forEach(i=>{
    html+=`
    <div class="card">
      <img src="${i.img}">
      <div>
        <h4>${i.name}</h4>
        <p>₹${i.price}</p>
      </div>
      <button onclick='addItem(${JSON.stringify(i)})'>Add</button>
    </div>`;
  });
  document.getElementById("menu").innerHTML=html;
}

function addItem(item){
  cart.push(item);
  updateTotal();
}

function updateTotal(){
  let total=cart.reduce((sum,i)=>sum+i.price,0);
  document.getElementById("total").innerText=total;
}

function placeOrder(){
  let phone=prompt("Enter WhatsApp Number:");

  let total=cart.reduce((sum,i)=>sum+i.price,0);
  let token="DTIG"+Math.floor(1000+Math.random()*9000);

  db.collection("orders").add({
    items:cart,
    total:total,
    token:token,
    phone:phone,
    status:"Preparing",
    createdAt:new Date()
  }).then(()=>{

    let msg=`Order Confirmed 🍽️\nToken:${token}\nAmount:₹${total}`;
    window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`);

    alert("Order Placed! Token: "+token);
    cart=[];
    updateTotal();
  });
}

loadMenu();
</script>

</body>
</html>
