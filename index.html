<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DTIG Cafeteria</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin:0;
  background:#f4f4f4;
}

/* HEADER */
.header {
  background:#FC8019;
  color:white;
  padding:15px;
  font-size:20px;
  font-weight:600;
}

/* CARD */
.card {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  margin:12px;
  padding:12px;
  border-radius:15px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

img {
  width:70px;
  height:70px;
  border-radius:10px;
}

.btn {
  background:#FC8019;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:8px;
}

.qty {
  display:flex;
  align-items:center;
}

.cart {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  box-shadow:0 -3px 10px rgba(0,0,0,0.2);
}

.hidden {display:none;}

.page {padding-bottom:80px;}
</style>
</head>

<body>

<div class="header">🍽️ DTIG Cafeteria</div>

<!-- MENU -->
<div id="menuPage" class="page"></div>

<!-- CART -->
<div class="cart">
  <div>₹ <span id="total">0</span></div>
  <button class="btn" onclick="openCart()">View Cart</button>
</div>

<!-- CART PAGE -->
<div id="cartPage" class="hidden page"></div>

<!-- CHECKOUT -->
<div id="checkoutPage" class="hidden page"></div>

<script>

let cart = [];

const items = [
{name:"Tea", price:15, img:"https://i.imgur.com/1bX5QH6.png"},
{name:"Coffee", price:20, img:"https://i.imgur.com/7s5V6wF.png"},
{name:"Omelette", price:35, img:"https://i.imgur.com/5WbQ7bD.png"},
{name:"Burger", price:80, img:"https://i.imgur.com/6X4Y3Gg.png"},
{name:"Fries", price:40, img:"https://i.imgur.com/2X8Qf8F.png"},
{name:"Momos", price:60, img:"https://i.imgur.com/oYiTqum.png"}
];

// LOAD MENU
function loadMenu(){
  let html="";
  items.forEach((item,i)=>{
    html+=`
    <div class="card">
      <img src="${item.img}">
      <div>
        <div>${item.name}</div>
        <div>₹${item.price}</div>
      </div>
      <div class="qty">
        <button onclick="add(${i})">+</button>
      </div>
    </div>`;
  });
  document.getElementById("menuPage").innerHTML=html;
}

// ADD ITEM
function add(i){
  let existing = cart.find(c=>c.name===items[i].name);
  if(existing){ existing.qty++; }
  else { cart.push({...items[i], qty:1}); }
  updateTotal();
}

// TOTAL
function updateTotal(){
  let total = cart.reduce((sum,i)=>sum+i.price*i.qty,0);
  document.getElementById("total").innerText=total;
}

// OPEN CART
function openCart(){
  document.getElementById("menuPage").classList.add("hidden");
  document.getElementById("cartPage").classList.remove("hidden");

  let html="<h3 style='padding:10px;'>Your Cart</h3>";
  cart.forEach((item,i)=>{
    html+=`
    <div class="card">
      ${item.name} x ${item.qty}
      ₹${item.price*item.qty}
    </div>`;
  });

  html+=`<button class="btn" onclick="checkout()">Proceed to Pay</button>`;
  document.getElementById("cartPage").innerHTML=html;
}

// CHECKOUT
function checkout(){
  document.getElementById("cartPage").classList.add("hidden");
  document.getElementById("checkoutPage").classList.remove("hidden");

  let token = Math.floor(Math.random()*1000);

  document.getElementById("checkoutPage").innerHTML=`
    <h3 style="padding:10px;">Payment Successful ✅</h3>
    <p style="padding:10px;">Token Number: <b>${token}</b></p>
    <p style="padding:10px;">Status: Preparing 🍳</p>
  `;
}

loadMenu();

</script>

</body>
</html>
