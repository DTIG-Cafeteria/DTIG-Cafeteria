<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DTIG Cafeteria</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>

body {
  font-family:'Poppins', sans-serif;
  margin:0;
  background:#fafafa;
}

/* HERO */
.hero {
  background:linear-gradient(135deg,#FC8019,#ff9f43);
  color:white;
  padding:30px 20px;
  border-bottom-left-radius:30px;
  border-bottom-right-radius:30px;
}

.hero h1 {margin:0; font-size:24px;}
.hero p {margin:5px 0 0; opacity:0.9;}

/* CATEGORY */
.categories {
  display:flex;
  overflow-x:auto;
  padding:15px;
}

.cat {
  background:white;
  padding:10px 15px;
  margin-right:10px;
  border-radius:20px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
  cursor:pointer;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.card {
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-body {
  padding:10px;
}

.title {
  font-weight:600;
}

.price {
  color:#555;
  margin:5px 0;
}

.btn {
  background:#FC8019;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  width:100%;
}

/* CART FLOAT */
.cart {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#FC8019;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:18px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div class="hero">
  <h1>🍽️ DTIG Cafeteria</h1>
  <p>Fresh • Fast • Affordable</p>
</div>

<div class="categories">
  <div class="cat">🔥 Popular</div>
  <div class="cat">☕ Beverages</div>
  <div class="cat">🍔 Snacks</div>
  <div class="cat">🍗 Chicken</div>
</div>

<div class="grid" id="menu"></div>

<div class="cart" onclick="openCart()">🛒</div>

<script>

let cart = [];

const items = [
{name:"Tea", price:15, img:"https://source.unsplash.com/300x200/?tea"},
{name:"Coffee", price:20, img:"https://source.unsplash.com/300x200/?coffee"},
{name:"Burger", price:80, img:"https://source.unsplash.com/300x200/?burger"},
{name:"Fries", price:40, img:"https://source.unsplash.com/300x200/?fries"},
{name:"Momos", price:60, img:"https://source.unsplash.com/300x200/?momos"},
{name:"Omelette", price:35, img:"https://source.unsplash.com/300x200/?omelette"}
];

function loadMenu(){
  let html="";
  items.forEach((item,i)=>{
    html+=`
    <div class="card">
      <img src="${item.img}">
      <div class="card-body">
        <div class="title">${item.name}</div>
        <div class="price">₹${item.price}</div>
        <button class="btn" onclick="add(${i})">Add to Cart</button>
      </div>
    </div>`;
  });
  document.getElementById("menu").innerHTML=html;
}

function add(i){
  cart.push(items[i]);
  alert("Added to cart ✅");
}

function openCart(){
  alert("Cart feature next upgrade 🔥");
}

loadMenu();

</script>

</body>
</html>
