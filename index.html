<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DTIG Cafeteria</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {font-family:Poppins;margin:0;background:#fafafa;text-align:center;}
.header {background:#ff5200;color:white;padding:15px;font-size:20px;}
input {padding:10px;margin:10px;width:80%;}
button {padding:10px;background:#ff5200;color:white;border:none;}
.grid {display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.card {background:white;padding:10px;border-radius:10px;}
.cart {position:fixed;bottom:0;width:100%;background:white;padding:10px;display:flex;justify-content:space-between;}
</style>
</head>

<body>

<div class="header">🍽️ DTIG Cafeteria</div>

<!-- LOGIN -->
<div id="login">
  <h3>Login / Signup</h3>
  <input id="phone" placeholder="Enter mobile number"><br>
  <div id="recaptcha"></div>
  <button onclick="sendOTP()">Send OTP</button>

  <div id="otpSection" style="display:none;">
    <input id="otp" placeholder="Enter OTP"><br>
    <button onclick="verifyOTP()">Verify OTP</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="grid" id="menu"></div>

  <div class="cart">
    ₹<span id="total">0</span>
    <button onclick="placeOrder()">Order</button>
  </div>
</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAPvkEd6A6Gy2Ar7zuG_fCAPecuj2joFN4",
  authDomain: "dtig-cafeteria.firebaseapp.com",
  projectId: "dtig-cafeteria"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Recaptcha
window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha');

// Send OTP
function sendOTP(){
  let phone = document.getElementById("phone").value;
  phone = "+91" + phone;

  auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
  .then(res=>{
    window.confirmationResult = res;
    document.getElementById("otpSection").style.display="block";
  })
  .catch(err=>alert(err.message));
}

// Verify OTP
function verifyOTP(){
  let otp = document.getElementById("otp").value;

  confirmationResult.confirm(otp)
  .then(()=>{
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  })
  .catch(()=>alert("Invalid OTP"));
}

// MENU
let cart=[];
const items=[
{name:"Tea",price:10},
{name:"Burger",price:80},
{name:"Fries",price:40}
];

function loadMenu(){
let html="";
items.forEach(i=>{
html+=`<div class="card">
${i.name}<br>₹${i.price}
<button onclick='add(${JSON.stringify(i)})'>Add</button>
</div>`;
});
document.getElementById("menu").innerHTML=html;
}

function add(i){
cart.push(i);
update();
}

function update(){
document.getElementById("total").innerText=
cart.reduce((s,i)=>s+i.price,0);
}

// PLACE ORDER
function placeOrder(){
let total=cart.reduce((s,i)=>s+i.price,0);
let token="DTIG"+Math.floor(Math.random()*9999);

db.collection("orders").add({
items:cart,
total:total,
token:token,
phone:auth.currentUser.phoneNumber,
status:"Preparing"
});

alert("Order placed! Token:"+token);
cart=[];
update();
}

loadMenu();
</script>

</body>
</html>
