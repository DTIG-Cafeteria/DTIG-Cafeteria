<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DTIG Cafeteria</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {font-family:Poppins;margin:0;background:#f5f5f5;}
.header {background:#ff5200;color:white;padding:15px;text-align:center;font-size:20px;}

.container {padding:20px;text-align:center;}

input {
padding:10px;
margin:10px;
width:80%;
border-radius:6px;
border:1px solid #ccc;
}

button {
background:#ff5200;
color:white;
border:none;
padding:10px;
width:85%;
border-radius:6px;
margin-top:10px;
}

.link {
color:#ff5200;
cursor:pointer;
margin-top:10px;
display:block;
}

.grid {
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:10px;
}

.card {
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img {
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.cart {
position:fixed;
bottom:0;
width:100%;
background:white;
padding:10px;
display:flex;
justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">🍽️ DTIG Cafeteria</div>

<!-- LOGIN -->
<div id="login" class="container">
<h3>Login</h3>
<input id="loginPhone" placeholder="Mobile Number">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<span class="link" onclick="showSignup()">New user? Sign Up</span>
</div>

<!-- SIGNUP -->
<div id="signup" class="container" style="display:none;">
<h3>Sign Up</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Mobile Number">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Create Account</button>

<span class="link" onclick="showLogin()">Already have account? Login</span>
</div>

<!-- APP -->
<div id="app" style="display:none;">
<div class="grid" id="menu"></div>

<div class="cart">
₹<span id="total">0</span>
<button onclick="placeOrder()">Order</button>
</div>
</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyAPvkEd6A6Gy2Ar7zuG_fCAPecuj2joFN4",
authDomain: "dtig-cafeteria.firebaseapp.com",
projectId: "dtig-cafeteria"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// SWITCH UI
function showSignup(){
document.getElementById("login").style.display="none";
document.getElementById("signup").style.display="block";
}

function showLogin(){
document.getElementById("signup").style.display="none";
document.getElementById("login").style.display="block";
}

// SIGNUP
function signup(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let pass=document.getElementById("password").value;

db.collection("users").doc(phone).set({
name:name,
phone:phone,
password:pass
}).then(()=>{
alert("Account Created");
showLogin();
});
}

// LOGIN
function login(){
let phone=document.getElementById("loginPhone").value;
let pass=document.getElementById("loginPass").value;

db.collection("users").doc(phone).get()
.then(doc=>{
if(doc.exists && doc.data().password===pass){
window.user=doc.data();
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
}else{
alert("Invalid Login");
}
});
}

// MENU
const items=[
{name:"Tea",price:15,img:"https://images.unsplash.com/photo-1511920170033-f8396924c348"},
{name:"Veg Burger",price:60,img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
{name:"Fries",price:40,img:"https://images.unsplash.com/photo-1576107232684-1279f390859f"},
{name:"Chicken Momos",price:80,img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"},
{name:"Paneer Tikka",price:120,img:"https://images.unsplash.com/photo-1603894584373-5ac82b2ae398"}
];

let cart=[];

function loadMenu(){
let html="";
items.forEach(i=>{
html+=`
<div class="card">
<img src="${i.img}">
<h4>${i.name}</h4>
<p>₹${i.price}</p>
<button onclick='add(${JSON.stringify(i)})'>Add</button>
</div>`;
});
document.getElementById("menu").innerHTML=html;
}

function add(i){
cart.push(i);
update();
}

function update(){
document.getElementById("total").innerText=
cart.reduce((s,i)=>s+i.price,0);
}

// ORDER
function placeOrder(){
let total=cart.reduce((s,i)=>s+i.price,0);
let token="DTIG"+Math.floor(Math.random()*9999);

db.collection("orders").add({
user:window.user.phone,
items:cart,
total:total,
token:token,
status:"Preparing"
});

alert("Order placed! Token: "+token);
cart=[];
update();
}

loadMenu();
</script>

</body>
</html>
