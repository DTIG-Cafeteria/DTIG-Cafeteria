<!DOCTYPE html>
<html>
<head>
    <title>DTIG Cafeteria</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial;
            margin:0;
            background:#f8f8f8;
        }

        header {
            background:#FC8019;
            color:white;
            padding:15px;
            font-size:22px;
            text-align:center;
        }

        .container {
            padding:10px;
        }

        .card {
            background:white;
            border-radius:12px;
            padding:15px;
            margin-bottom:10px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        button {
            background:#FC8019;
            color:white;
            border:none;
            padding:8px 12px;
            border-radius:6px;
        }

        .cart {
            position:fixed;
            bottom:0;
            width:100%;
            background:white;
            padding:10px;
            box-shadow:0 -2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<header>DTIG Cafeteria 🍽️</header>

<div class="container">

<div class="card">
    <div>
        <b>Veg Burger</b><br>₹60
    </div>
    <button onclick="add('Veg Burger',60)">Add</button>
</div>

<div class="card">
    <div>
        <b>Fries</b><br>₹40
    </div>
    <button onclick="add('Fries',40)">Add</button>
</div>

<div class="card">
    <div>
        <b>Veg Momos</b><br>₹60
    </div>
    <button onclick="add('Veg Momos',60)">Add</button>
</div>

<div class="card">
    <div>
        <b>Tea</b><br>₹15
    </div>
    <button onclick="add('Tea',15)">Add</button>
</div>

</div>

<div class="cart">
    <span id="total">Total: ₹0</span>
    <button onclick="order()">Place Order</button>
</div>

<script>
let cart = [];
let total = 0;

function add(item, price){
    cart.push(item);
    total += price;
    document.getElementById("total").innerText = "Total: ₹" + total;
}

function order(){
    localStorage.setItem("order", JSON.stringify(cart));
    alert("Order Placed!");
}
</script>

</body>
</html>
