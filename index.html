<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DTIG Cafeteria</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin:0;
  background:#f8f8f8;
}

/* HEADER */
.header {
  background:#FC8019;
  color:white;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

/* LOGIN */
.login {
  padding:20px;
}

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* MENU */
.container {
  padding:15px;
}

.category {
  font-weight:bold;
  margin-top:20px;
}

.card {
  display:flex;
  justify-content:space-between;
  background:white;
  padding:15px;
  margin-top:10px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.item-name {
  font-weight:600;
}

.price {
  color:#555;
}

/* BUTTON */
.btn {
  background:#FC8019;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
}

/* CART */
.cart {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.hidden {display:none;}

</style>
</head>

<body>

<div class="header">🍽️ DTIG Cafeteria</div>

<!-- LOGIN -->
<div class="login" id="loginPage">
  <h3>Enter Phone Number</h3>
  <input id="phone" placeholder="Phone Number">
  <br><br>
  <button class="btn" onclick="login()">Continue</button>
</div>

<!-- MENU -->
<div class="container hidden" id="menuPage">
  <div class="category">🔥 Popular</div>

  <div id="menu"></div>
</div>

<!-- CART -->
<div class="cart hidden" id="cartBar">
  <div>Total: ₹<span id="total">0</span></div>
  <button class="btn" onclick="checkout()">Checkout</button>
</div>

<script>

let cart = [];

const menuItems = [
{name:"Tea", price:15},
{name:"Coffee", price:20},
{name:"Omelette", price:35},
{name:"Veg Sandwich", price:45},
{name:"Chicken Burger", price:80},
{name:"Fries", price:40},
{name:"Veg Momos", price:60},
{name:"Chicken Nuggets", price:70}
];

function login(){
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("menuPage").classList.remove("hidden");
  document.getElementById("cartBar").classList.remove("hidden");
  loadMenu();
}

function loadMenu(){
  let html="";
  menuItems.forEach((item,i)=>{
    html += `
    <div class="card">
      <div>
        <div class="item-name">${item.name}</div>
        <div class="price">₹${item.price}</div>
      </div>
      <button class="btn" onclick="add(${i})">Add</button>
    </div>`;
  });
  document.getElementById("menu").innerHTML=html;
}

function add(i){
  cart.push(menuItems[i]);
  updateCart();
}

function updateCart(){
  let total = cart.reduce((sum,item)=>sum+item.price,0);
  document.getElementById("total").innerText = total;
}

function checkout(){
  alert("Checkout feature coming next upgrade 🔥");
}

</script>

</body>
</html>
