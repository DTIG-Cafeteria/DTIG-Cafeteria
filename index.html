<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DTIG Cafeteria</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body {font-family:Poppins;margin:0;background:#fafafa;}
.header {background:#ff5200;color:white;padding:15px;text-align:center;}
.login {padding:20px;text-align:center;}
input {padding:10px;margin:5px;width:80%;}
button {padding:10px;background:#ff5200;color:white;border:none;}
.grid {display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.card {background:white;padding:10px;border-radius:10px;}
.cart {position:fixed;bottom:0;width:100%;background:white;padding:10px;display:flex;justify-content:space-between;}
</style>
</head>

<body>

<div class="header">🍽️ DTIG Cafeteria</div>

<div id="loginDiv" class="login">
  <h3>Login</h3>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <div class="grid" id="menu"></div>

  <div class="cart">
    ₹<span id="total">0</span>
    <button onclick="pay()">Pay</button>
  </div>
</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAPvkEd6A6Gy2Ar7zuG_fCAPecuj2joFN4",
  authDomain: "dtig-cafeteria.firebaseapp.com",
  projectId: "dtig-cafeteria"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let cart=[];

// LOGIN
function login(){
  let email=document.getElementById("email").value;
  let pass=document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,pass)
  .then(()=>{
    document.getElementById("loginDiv").style.display="none";
    document.getElementById("app").style.display="block";
  })
  .catch(()=>alert("Login failed"));
}

// MENU
const items=[
{name:"Tea",price:10},
{name:"Burger",price:80},
{name:"Fries",price:40}
];

function loadMenu(){
let html="";
items.forEach(i=>{
html+=`<div class="card">
${i.name}<br>₹${i.price}
<button onclick='add(${JSON.stringify(i)})'>Add</button>
</div>`;
});
document.getElementById("menu").innerHTML=html;
}

function add(i){
cart.push(i);
update();
}

function update(){
document.getElementById("total").innerText=
cart.reduce((s,i)=>s+i.price,0);
}

// PAYMENT
function pay(){
let total=cart.reduce((s,i)=>s+i.price,0);

var options={
key:"YOUR_RAZORPAY_KEY",
amount:total*100,
currency:"INR",
handler:function(){
  saveOrder();
}
};

new Razorpay(options).open();
}

// SAVE ORDER
function saveOrder(){
let token="DTIG"+Math.floor(Math.random()*9999);

db.collection("orders").add({
items:cart,
token:token,
status:"Preparing",
user:auth.currentUser.email
});

alert("Order placed! Token:"+token);
cart=[];
update();
}

loadMenu();
</script>

</body>
</html>
